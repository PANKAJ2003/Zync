server:
  port: 8083

spring:
  application:
    name: executor-service
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.zync.domain.events"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY} # We can use any OpenAI compatible API key here
      base-url: ${OPENAI_BASE_URL} # Use the base URL of the provider you are using in API Key
      chat:
        options:
          model: nvidia/nemotron-3-ultra-550b-a55b:free


resilience4j:
  retry:
    instances:
      httpAdapterRetry:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
          - org.springframework.web.client.RestClientException
management:
  tracing:
    sampling:
      probability: 1.0 # 100% of traces
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"