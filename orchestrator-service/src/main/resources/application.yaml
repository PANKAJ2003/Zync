server:
  port: 8082 # Orchestrator runs on 8082

spring:
  application:
    name: orchestrator-service

  # Enable Java 21+ Virtual Threads for massive scalability!
  threads:
    virtual:
      enabled: true

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/workflow_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  # Hibernate Configuration (Auto-creates our tables for now)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Cache Configuration with TTL
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  # Kafka Consumer Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: "zync-orchestrator-group" # The Consumer Group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.zync.domain.events" # Trusts our WebhookEvent class!
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true


# OpenTelemetry Configuration

management:
  tracing:
    sampling:
      probability: 1.0 # 100% of traces
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"