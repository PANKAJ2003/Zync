server:
  port: ${SERVER_PORT:-8082}

spring:
  application:
    name: orchestrator-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL:-jdbc:postgresql://localhost:5432/workflow_db}
    username: ${DATABASE_USER:-admin}
    password: ${DATABASE_PASSWORD:-password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${VALKEY_HOST:-localhost}
      port: ${VALKEY_PORT:-6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    consumer:
      group-id: "zync-orchestrator-group"
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.zync.domain.events"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true


management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:-http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
